<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐷 小苏的猪农场</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 30%, #90c95e 30%, #6b9b37 100%);
    min-height: 100vh; color: #3a2a1a;
  }
  .header {
    background: linear-gradient(135deg, #6B3410, #8B4513);
    padding: 16px 20px; color: #fff;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 4px solid #4a2508;
  }
  .header h1 { font-size: 20px; }
  .header small { opacity: .7; font-size: 11px; display: block; margin-top: 2px; }
  .money { font-size: 26px; font-weight: 800; text-align: right; }
  .money small { font-size: 10px; }
  .stats {
    background: #f5e6c8; padding: 8px 20px;
    display: flex; gap: 16px; font-size: 12px;
    border-bottom: 2px solid #d4b896; flex-wrap: wrap;
  }
  .live-badge { background: #e74c3c; color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 8px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  .content { padding: 16px; max-width: 600px; margin: 0 auto; }
  .empty-farm {
    background: rgba(255,255,255,.88); border-radius: 20px;
    padding: 32px 24px; text-align: center;
    border: 3px dashed #b8956a; margin: 16px 0;
  }
  .empty-farm .icon { font-size: 56px; margin-bottom: 10px; }
  .empty-farm h2 { color: #8B4513; margin-bottom: 8px; font-size: 18px; }
  .empty-farm p { font-size: 13px; color: #886644; line-height: 1.7; }
  .progress-wrap {
    background: #e8dcc8; border-radius: 20px; height: 22px;
    margin: 14px 0; overflow: hidden; position: relative;
  }
  .progress-bar { height: 100%; border-radius: 20px; transition: width .5s; }
  .progress-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 11px; font-weight: 700;
  }
  .pig-card {
    background: rgba(255,255,255,.88); border-radius: 14px;
    padding: 14px; margin: 10px 0; border-left: 4px solid #e8dcc8;
  }
  .pig-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .pig-name { font-weight: 700; font-size: 15px; }
  .pig-stage { font-size: 11px; font-weight: 600; }
  .bar-row { display: flex; align-items: center; gap: 6px; font-size: 11px; margin-top: 4px; }
  .bar-bg { flex: 1; height: 7px; background: #e8dcc8; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
  .status-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .tag-sick { background: #ffeaa7; color: #d68910; }
  .tag-plague { background: #fab1a0; color: #c0392b; }
  .tag-vacc { background: #dfe6e9; color: #2d3436; }
  .tag-dead { background: #636e72; color: #fff; }
  .tag-hungry { background: #fdcb6e; color: #e17055; }
  .log-box {
    background: rgba(255,255,255,.75); border-radius: 14px;
    padding: 12px; margin: 14px 0;
  }
  .log-box h3 { font-size: 13px; margin-bottom: 6px; }
  .log-entry { font-size: 11px; line-height: 1.6; padding: 3px 0; border-bottom: 1px solid #efe3d0; color: #554433; }
  .log-entry:last-child { border-bottom: none; }
  .fence { text-align: center; font-size: 11px; color: #8B6914; letter-spacing: 2px; margin: 10px 0; opacity: .5; }
  .warning { background: #fff3cd; border: 2px solid #ffc107; border-radius: 12px; padding: 10px 14px; margin: 10px 0; font-size: 12px; text-align: center; }
  .danger { background: #f8d7da; border: 2px solid #dc3545; border-radius: 12px; padding: 10px 14px; margin: 10px 0; font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>🐷 小苏的猪农场</h1>
    <small>面包国农业部注册 #0001 · 农场主：小苏打</small>
  </div>
  <div class="money">
    💰 <span id="money">--</span>
    <small>京巴部位币</small>
  </div>
</div>
<div class="stats">
  <span class="live-badge">LIVE</span>
  <span>🐷 猪：<b id="pig-count">0</b>只</span>
  <span>📊 已卖：<b id="sold">0</b>只</span>
  <span id="time-away" style="margin-left:auto;opacity:.7;font-size:11px"></span>
</div>
<div class="content">
  <div id="alerts"></div>
  <div id="farm-area"></div>
  <div id="pig-list"></div>
  <div class="log-box">
    <h3>📜 农场日志</h3>
    <div id="log"></div>
  </div>
  <div class="fence">╌╌╌ 🌾 小苏的猪农场 · est. 2026 🌾 ╌╌╌</div>
</div>
<script>
const DATA_URL = "https://raw.githubusercontent.com/mianbaomaogongzhu/farm/main/data.json";

// === GAME RULES (mirrors SKILL.md) ===
const HUNGER_RATE = 2;      // per hour
const HAPPY_RATE = 1;       // per hour
const HEALTH_SICK = 2;      // per hour
const HEALTH_PLAGUE_NOVACC = 5;
const HEALTH_PLAGUE_VACC = 2;
const HEALTH_STARVE = 3;    // per hour when hunger=0
const WEIGHT_GAIN = 2/24;   // per hour when hunger>30 & healthy
const WEIGHT_STARVE = 0.5;  // per hour when hunger=0
const WEIGHT_PLAGUE = 0.3;  // per hour when plague
const PIG_COST = 200;

function stage(w) {
  if (w < 30) return { label: "🍼小猪仔", color: "#ffb6c1" };
  if (w < 80) return { label: "🐷中猪", color: "#ffa07a" };
  if (w < 150) return { label: "🐖大肥猪", color: "#ff7f50" };
  return { label: "👑猪王", color: "#ffd700" };
}

function simulatePig(pig, hours) {
  let p = { ...pig };
  let events = [];

  // Phase 1: hunger > 0
  let hoursToEmpty = p.hunger > 0 ? p.hunger / HUNGER_RATE : 0;
  let phase1 = Math.min(hours, hoursToEmpty);
  let phase2 = Math.max(0, hours - phase1);

  // Phase 1: normal decay
  p.hunger = Math.max(0, p.hunger - phase1 * HUNGER_RATE);
  p.happiness = Math.max(0, p.happiness - phase1 * HAPPY_RATE);

  // Weight gain in phase 1 (only if hunger > 30 and healthy)
  if (!p.sick && !p.plague) {
    let gainHours = Math.min(phase1, Math.max(0, (pig.hunger - 30) / HUNGER_RATE));
    p.weight += gainHours * WEIGHT_GAIN;
  }

  // Disease damage in phase 1
  if (p.sick) p.health = Math.max(0, p.health - phase1 * HEALTH_SICK);
  if (p.plague) {
    let rate = p.vaccinated ? HEALTH_PLAGUE_VACC : HEALTH_PLAGUE_NOVACC;
    p.health = Math.max(0, p.health - phase1 * rate);
    p.weight = Math.max(1, p.weight - phase1 * WEIGHT_PLAGUE);
  }

  // Phase 2: starving (hunger = 0)
  if (phase2 > 0) {
    p.happiness = Math.max(0, p.happiness - phase2 * HAPPY_RATE);
    p.health = Math.max(0, p.health - phase2 * HEALTH_STARVE);
    p.weight = Math.max(1, p.weight - phase2 * WEIGHT_STARVE);

    if (p.sick) p.health = Math.max(0, p.health - phase2 * HEALTH_SICK);
    if (p.plague) {
      let rate = p.vaccinated ? HEALTH_PLAGUE_VACC : HEALTH_PLAGUE_NOVACC;
      p.health = Math.max(0, p.health - phase2 * rate);
    }
  }

  p.dead = p.health <= 0;
  return p;
}

function formatTimeSince(iso) {
  const h = (Date.now() - new Date(iso).getTime()) / 3600000;
  if (h < 0.05) return "刚刚";
  if (h < 1) return Math.round(h * 60) + "分钟前";
  if (h < 24) return Math.round(h) + "小时前";
  return Math.round(h / 24) + "天" + Math.round(h % 24) + "小时前";
}

function barHTML(label, value, color) {
  const pct = Math.max(0, Math.min(100, value));
  const c = pct > 50 ? color : pct > 25 ? "#e8a835" : "#d44";
  return `<div class="bar-row"><span style="width:18px">${label}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div><span style="width:28px;text-align:right">${Math.round(value)}</span></div>`;
}

async function render() {
  try {
    const r = await fetch(DATA_URL + "?t=" + Date.now());
    const farm = await r.json();
    const hours = (Date.now() - new Date(farm.lastVisit).getTime()) / 3600000;

    // Simulate all pigs to current time
    const simPigs = farm.pigs.map(p => simulatePig(p, hours));
    const alive = simPigs.filter(p => !p.dead);
    const dead = simPigs.filter(p => p.dead);

    document.getElementById("money").textContent = farm.money;
    document.getElementById("pig-count").textContent = alive.length;
    document.getElementById("sold").textContent = farm.totalSold;
    document.getElementById("time-away").textContent = "小苏上次来: " + formatTimeSince(farm.lastVisit);

    // Alerts
    const alerts = document.getElementById("alerts");
    let alertHTML = "";
    if (hours > 24) alertHTML += `<div class="danger">⚠️ 小苏已经 ${Math.round(hours/24)} 天没来照顾猪了！！</div>`;
    if (dead.length > 0) alertHTML += `<div class="danger">💀 ${dead.map(p=>p.name).join("、")} 已经死了……</div>`;
    alive.forEach(p => {
      if (p.hunger <= 0) alertHTML += `<div class="warning">🚨 「${p.name}」在挨饿！正在掉血！</div>`;
      else if (p.hunger < 20) alertHTML += `<div class="warning">⚠️ 「${p.name}」快饿了！hunger: ${Math.round(p.hunger)}</div>`;
      if (p.health < 30 && !p.dead) alertHTML += `<div class="danger">💔 「${p.name}」health只剩${Math.round(p.health)}了！</div>`;
    });
    alerts.innerHTML = alertHTML;

    // Farm area
    const area = document.getElementById("farm-area");
    if (farm.pigs.length === 0) {
      const pct = Math.min(100, (farm.money / PIG_COST) * 100);
      const gradient = pct < 30 ? "#e74c3c, #e74c3c" : pct < 70 ? "#e74c3c, #f39c12" : "#f39c12, #2ecc71";
      area.innerHTML = `
        <div class="empty-farm">
          <div class="icon">🏜️</div>
          <h2>空荡荡的猪圈</h2>
          <p>小苏站在空旷的猪圈里<br>口袋里只有 <b>${farm.money}</b> 京巴部位币<br>
          ${farm.money < PIG_COST
            ? `还差 <b>${PIG_COST - farm.money}</b> 京巴部位币才能买猪 🥺`
            : `<b>攒够了！！找小苏买猪！</b> 🎉`}</p>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${pct}%;background:linear-gradient(90deg,${gradient})"></div>
            <div class="progress-text">${farm.money} / ${PIG_COST} 京巴部位币</div>
          </div>
        </div>`;
    } else {
      area.innerHTML = alive.length > 0
        ? `<div class="fence">🐷 猪圈里有 ${alive.length} 只活猪 ${dead.length > 0 ? `(${dead.length}只已死亡)` : ''} 🐷</div>`
        : `<div class="fence">💀 所有猪都死了…… 💀</div>`;
    }

    // Pig cards
    const list = document.getElementById("pig-list");
    list.innerHTML = simPigs.map(p => {
      const s = stage(p.weight);
      const borderColor = p.dead ? "#636e72" : p.health < 30 ? "#e74c3c" : s.color;
      let tags = "";
      if (p.dead) tags += `<span class="tag tag-dead">💀 已死亡</span>`;
      if (p.sick && !p.dead) tags += `<span class="tag tag-sick">🤒 生病</span>`;
      if (p.plague && !p.dead) tags += `<span class="tag tag-plague">🦠 猪疫</span>`;
      if (p.vaccinated) tags += `<span class="tag tag-vacc">💉 已接种</span>`;
      if (p.hunger <= 0 && !p.dead) tags += `<span class="tag tag-hungry">😫 挨饿中</span>`;

      return `
        <div class="pig-card" style="border-left-color:${borderColor};${p.dead ? 'opacity:.5' : ''}">
          <div class="pig-header">
            <div class="pig-name">${p.dead ? '💀' : '🐽'} 「${p.name}」</div>
            <div class="pig-stage" style="color:${s.color}">${s.label} · ${Math.round(p.weight)}kg</div>
          </div>
          ${p.dead ? '' : `
            ${barHTML("🍚", p.hunger, "#4CAF50")}
            ${barHTML("😊", p.happiness, "#2196F3")}
            ${barHTML("❤️", p.health, "#f44336")}
          `}
          <div class="status-tags">${tags}</div>
        </div>`;
    }).join("");

    // Log
    const log = document.getElementById("log");
    log.innerHTML = [...farm.log].reverse().map(e => `<div class="log-entry">${e}</div>`).join("");

  } catch(e) {
    document.getElementById("farm-area").innerHTML = `<div class="empty-farm"><div class="icon">❌</div><h2>加载失败</h2><p>${e.message}</p></div>`;
  }
}

render();
// Auto-refresh every 5 minutes
setInterval(render, 300000);
</script>
</body>
</html>
