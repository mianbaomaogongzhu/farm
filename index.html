<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐷 小苏的猪农场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(180deg,#87CEEB 0%,#87CEEB 30%,#90c95e 30%,#6b9b37 100%);min-height:100vh;color:#3a2a1a}
.header{background:linear-gradient(135deg,#6B3410,#8B4513);padding:16px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid #4a2508}
.header h1{font-size:20px}.header small{opacity:.7;font-size:11px;display:block;margin-top:2px}
.money{font-size:26px;font-weight:800;text-align:right}.money small{font-size:10px}
.stats{background:#f5e6c8;padding:8px 20px;display:flex;gap:16px;font-size:12px;border-bottom:2px solid #d4b896;flex-wrap:wrap}
.live{background:#e74c3c;color:#fff;font-size:9px;padding:2px 6px;border-radius:8px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.content{padding:16px;max-width:600px;margin:0 auto}
.empty-farm{background:rgba(255,255,255,.88);border-radius:20px;padding:32px 24px;text-align:center;border:3px dashed #b8956a;margin:16px 0}
.empty-farm .icon{font-size:56px;margin-bottom:10px}
.empty-farm h2{color:#8B4513;margin-bottom:8px;font-size:18px}
.empty-farm p{font-size:13px;color:#886644;line-height:1.7}
.pbar-wrap{background:#e8dcc8;border-radius:20px;height:22px;margin:14px 0;overflow:hidden;position:relative}
.pbar{height:100%;border-radius:20px;transition:width .5s}
.pbar-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700}
.pig-card{background:rgba(255,255,255,.88);border-radius:14px;padding:14px;margin:10px 0;border-left:4px solid #e8dcc8}
.pig-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pig-name{font-weight:700;font-size:15px}.pig-stage{font-size:11px;font-weight:600}
.br{display:flex;align-items:center;gap:6px;font-size:11px;margin-top:3px}
.br-bg{flex:1;height:7px;background:#e8dcc8;border-radius:4px;overflow:hidden}
.br-fill{height:100%;border-radius:4px;transition:width .3s}
.tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.t-sick{background:#ffeaa7;color:#d68910}.t-plague{background:#fab1a0;color:#c0392b}
.t-vacc{background:#dfe6e9;color:#2d3436}.t-dead{background:#636e72;color:#fff}
.t-hungry{background:#fdcb6e;color:#e17055}.t-pers{background:#a29bfe;color:#fff}
.t-sex{background:#fd79a8;color:#fff}
.log-box{background:rgba(255,255,255,.75);border-radius:14px;padding:12px;margin:14px 0}
.log-box h3{font-size:13px;margin-bottom:6px}
.log-e{font-size:11px;line-height:1.6;padding:3px 0;border-bottom:1px solid #efe3d0;color:#554433}
.log-e:last-child{border-bottom:none}
.grave-box{background:rgba(100,100,100,.15);border-radius:14px;padding:12px;margin:14px 0}
.grave-box h3{font-size:13px;margin-bottom:6px;color:#636e72}
.grave-entry{font-size:11px;line-height:1.6;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.08);color:#555}
.grave-entry:last-child{border-bottom:none}
.fence{text-align:center;font-size:11px;color:#8B6914;letter-spacing:2px;margin:10px 0;opacity:.5}
.warning{background:#fff3cd;border:2px solid #ffc107;border-radius:12px;padding:10px 14px;margin:8px 0;font-size:12px;text-align:center}
.danger{background:#f8d7da;border:2px solid #dc3545;border-radius:12px;padding:10px 14px;margin:8px 0;font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="header">
  <div><h1>🐷 小苏的猪农场</h1><small>面包国农业部 #0001 · 农场主：小苏打</small></div>
  <div class="money">💰 <span id="money">--</span><small>京巴部位币</small></div>
</div>
<div class="stats">
  <span class="live">LIVE</span>
  <span>🐷 活猪：<b id="pig-count">0</b></span>
  <span>🪦 墓地：<b id="grave-count">0</b></span>
  <span>📊 已卖：<b id="sold">0</b></span>
  <span id="time-away" style="margin-left:auto;opacity:.7;font-size:11px"></span>
</div>
<div class="content">
  <div id="alerts"></div>
  <div id="farm-area"></div>
  <div id="pig-list"></div>
  <div class="log-box"><h3>📜 农场日志</h3><div id="log"></div></div>
  <div id="graveyard"></div>
  <div class="fence">╌╌╌ 🌾 小苏的猪农场 · est. 2026 🌾 ╌╌╌</div>
</div>
<script>
const DATA_URL="https://raw.githubusercontent.com/mianbaomaogongzhu/farm/main/data.json";
const HR=2,HPR=1,HS=2,HP5=5,HP2=2,HST=3,WG=2/24,WS=.5,WP=.3,PC=200;

const PERS_HUNGER={"能吃":3,"懒猪":1.5};
const PERS_WG={"能吃":3/24,"懒猪":1/24};

function stg(w){
  if(w<30)return{l:"🍼小猪仔",c:"#ffb6c1"};if(w<80)return{l:"🐷中猪",c:"#ffa07a"};
  if(w<150)return{l:"🐖大肥猪",c:"#ff7f50"};return{l:"👑猪王",c:"#ffd700"}}

function sim(pig,hours){
  let p={...pig},hr=PERS_HUNGER[p.personality]||HR,wg=PERS_WG[p.personality]||WG;
  let h2e=p.hunger>0?p.hunger/hr:0,p1=Math.min(hours,h2e),p2=Math.max(0,hours-p1);
  p.hunger=Math.max(0,p.hunger-p1*hr);p.happiness=Math.max(0,p.happiness-hours*(p.personality==="暴躁"?2:HPR));
  if(!p.sick&&!p.plague){let gh=Math.min(p1,Math.max(0,(pig.hunger-30)/hr));p.weight+=gh*wg}
  if(p.sick){let r=p.personality==="抗病"?HS/2:HS;p.health=Math.max(0,p.health-p1*r)}
  if(p.plague){let r=p.vaccinated?HP2:HP5;if(p.personality==="抗病")r/=2;p.health=Math.max(0,p.health-p1*r);p.weight=Math.max(1,p.weight-p1*WP)}
  if(p2>0){p.happiness=Math.max(0,p.happiness-p2*(p.personality==="暴躁"?2:HPR));
    p.health=Math.max(0,p.health-p2*HST);p.weight=Math.max(1,p.weight-p2*WS);
    if(p.sick){let r=p.personality==="抗病"?HS/2:HS;p.health=Math.max(0,p.health-p2*r)}
    if(p.plague){let r=p.vaccinated?HP2:HP5;if(p.personality==="抗病")r/=2;p.health=Math.max(0,p.health-p2*r)}}
  p.dead=p.health<=0;return p}

function fmt(iso){let h=(Date.now()-new Date(iso).getTime())/36e5;
  if(h<.05)return"刚刚";if(h<1)return Math.round(h*60)+"分钟前";
  if(h<24)return Math.round(h)+"小时前";return Math.round(h/24)+"天"+Math.round(h%24)+"小时前"}

function bar(l,v,c){let p=Math.max(0,Math.min(100,v)),cl=p>50?c:p>25?"#e8a835":"#d44";
  return`<div class="br"><span style="width:18px">${l}</span><div class="br-bg"><div class="br-fill" style="width:${p}%;background:${cl}"></div></div><span style="width:28px;text-align:right">${Math.round(v)}</span></div>`}

function days(iso){return Math.round((Date.now()-new Date(iso).getTime())/864e5)}

async function render(){try{
  const r=await fetch(DATA_URL+"?t="+Date.now()),farm=await r.json();
  const hours=(Date.now()-new Date(farm.lastVisit).getTime())/36e5;
  const sp=farm.pigs.map(p=>sim(p,hours)),alive=sp.filter(p=>!p.dead),dead=sp.filter(p=>p.dead);
  const gy=farm.graveyard||[];

  document.getElementById("money").textContent=farm.money;
  document.getElementById("pig-count").textContent=alive.length;
  document.getElementById("grave-count").textContent=gy.length+dead.length;
  document.getElementById("sold").textContent=farm.totalSold;
  document.getElementById("time-away").textContent="小苏上次来: "+fmt(farm.lastVisit);

  let al="";
  if(hours>24)al+=`<div class="danger">⚠️ 小苏已经 ${Math.round(hours/24)} 天没来了！！</div>`;
  dead.forEach(p=>al+=`<div class="danger">💀「${p.name}」已经死了……</div>`);
  alive.forEach(p=>{if(p.hunger<=0)al+=`<div class="warning">🚨「${p.name}」在挨饿！正在掉血！</div>`;
    else if(p.hunger<20)al+=`<div class="warning">⚠️「${p.name}」快饿了！</div>`;
    if(p.health<30&&!p.dead)al+=`<div class="danger">💔「${p.name}」health只剩${Math.round(p.health)}！</div>`});
  document.getElementById("alerts").innerHTML=al;

  const area=document.getElementById("farm-area");
  if(farm.pigs.length===0){let pct=Math.min(100,(farm.money/PC)*100);
    area.innerHTML=`<div class="empty-farm"><div class="icon">🏜️</div><h2>空荡荡的猪圈</h2>
    <p>小苏口袋里只有 <b>${farm.money}</b> 京巴部位币<br>
    ${farm.money<PC?`还差 <b>${PC-farm.money}</b> 才能买猪 🥺`:`<b>攒够了！找小苏买猪！</b> 🎉`}</p>
    <div class="pbar-wrap"><div class="pbar" style="width:${pct}%;background:linear-gradient(90deg,${pct<50?"#e74c3c,#f39c12":"#f39c12,#2ecc71"})"></div>
    <div class="pbar-text">${farm.money}/${PC}</div></div></div>`}
  else{area.innerHTML=alive.length>0
    ?`<div class="fence">🐷 ${alive.length} 只活猪${dead.length>0?` · 💀 ${dead.length} 只刚死`:""}</div>`
    :`<div class="fence">💀 所有猪都死了…… 💀</div>`}

  document.getElementById("pig-list").innerHTML=sp.map(p=>{const s=stg(p.weight);
    let tg="";
    if(p.dead)tg+=`<span class="tag t-dead">💀 已死亡</span>`;
    if(p.personality)tg+=`<span class="tag t-pers">🎭 ${p.personality}</span>`;
    if(p.sex)tg+=`<span class="tag t-sex">${p.sex==="公"?"♂":"♀"} ${p.sex}</span>`;
    if(p.sick&&!p.dead)tg+=`<span class="tag t-sick">🤒 生病</span>`;
    if(p.plague&&!p.dead)tg+=`<span class="tag t-plague">🦠 猪疫</span>`;
    if(p.vaccinated)tg+=`<span class="tag t-vacc">💉 已接种</span>`;
    if(p.hunger<=0&&!p.dead)tg+=`<span class="tag t-hungry">😫 挨饿</span>`;
    return`<div class="pig-card" style="border-left-color:${p.dead?"#636e72":p.health<30?"#e74c3c":s.c};${p.dead?"opacity:.5":""}">
    <div class="pig-hdr"><div class="pig-name">${p.dead?"💀":"🐽"}「${p.name}」</div>
    <div class="pig-stage" style="color:${s.c}">${s.l} · ${Math.round(p.weight)}kg</div></div>
    ${p.dead?"":bar("🍚",p.hunger,"#4CAF50")+bar("😊",p.happiness,"#2196F3")+bar("❤️",p.health,"#f44336")}
    <div class="tags">${tg}</div></div>`}).join("");

  document.getElementById("log").innerHTML=[...farm.log].reverse().map(e=>`<div class="log-e">${e}</div>`).join("");

  // Graveyard
  const allDead=[...gy,...dead.map(p=>({name:p.name,personality:p.personality||"?",sex:p.sex||"?",
    deathTime:"(刚死)",causeOfDeath:"待小苏确认",maxWeight:Math.round(p.weight)}))];
  if(allDead.length>0){document.getElementById("graveyard").innerHTML=`<div class="grave-box">
    <h3>🪦 墓地 · ${allDead.length} 只猪长眠于此</h3>
    ${allDead.map(g=>`<div class="grave-entry">🪦「${g.name}」${g.sex==="公"?"♂":"♀"} · ${g.personality} · 最重${g.maxWeight}kg · ${g.causeOfDeath}</div>`).join("")}</div>`}

}catch(e){document.getElementById("farm-area").innerHTML=`<div class="empty-farm"><div class="icon">❌</div><h2>加载失败</h2><p>${e.message}</p></div>`}}
render();setInterval(render,300000);
</script>
</body>
</html>
